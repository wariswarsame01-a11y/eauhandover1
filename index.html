<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edna Adan Hospital Handover</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --hospital-primary: #0a9396;
            --hospital-dark: #0b3b4b;
            --hospital-teal: #1d6f7a;
        }

        body { 
            margin: 0; 
            background: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        .app-container { 
            width: 1400px; 
            max-width: 100%; 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            overflow: hidden; 
        }

        .login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.5); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            backdrop-filter: blur(4px); 
        }

        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 32px; 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
        }

        .btn-editor { background: #0a9396; color: white; }
        .btn-viewer { background: #6c757d; color: white; }

        .header { 
            background: #0b3b4b; 
            color: white; 
            padding: 18px 28px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .main-tabs { display: flex; background: #1d6f7a; }
        .tab-btn { 
            flex: 1; 
            padding: 14px; 
            border: none; 
            background: none; 
            color: white; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 16px; 
            border-right: 1px solid #7fb7be; 
        }
        .tab-btn.active { background: #0b3b4b; }

        .step-indicator { 
            display: flex; 
            background: #e9ecef; 
            border-radius: 60px; 
            margin-bottom: 30px; 
            overflow: hidden; 
        }
        .step { flex: 1; padding: 14px; text-align: center; font-weight: 600; color: #495057; }
        .step.active { background: #0a9396; color: white; }

        .form-section { 
            background: #f8f9fa; 
            padding: 25px; 
            border-radius: 24px; 
            margin-bottom: 25px; 
            border: 1px solid #dee2e6; 
        }

        .hospital-input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ced4da; 
            border-radius: 16px; 
            font-size: 15px; 
        }

        .hospital-btn { 
            background: #0a9396; 
            color: white; 
            border: none; 
            padding: 14px 30px; 
            border-radius: 40px; 
            cursor: pointer; 
            font-weight: 600; 
        }

        .shift-card { 
            background: white; 
            border-radius: 24px; 
            margin-bottom: 30px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); 
            border: 1px solid #dee2e6; 
            overflow: hidden; 
        }

        .shift-header { 
            background: #e2f0f2; 
            padding: 18px 24px; 
            font-size: 1.3rem; 
            font-weight: 600; 
            color: #0b3b4b; 
            display: flex; 
            justify-content: space-between;
            border-bottom: 2px solid #b0d4da; 
        }

        .patient-block { padding: 20px 24px; border-bottom: 1px solid #dee2e6; }
        .patient-title { font-size: 1.2rem; font-weight: 600; color: #0a9396; }
        .history-section { 
            background: #fafafa; 
            padding: 15px; 
            border-radius: 16px; 
            margin: 10px 0; 
            white-space: pre-wrap; 
            font-family: monospace; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURATION ---
        // https://script.google.com/macros/s/AKfycbz2gS75PLR6IsCzpkH4f2QpWbDheUslxpKOgGuZ-tOeEjKcQaX7HExQlgV_ZX54US0uIg/exec

        const INITIAL_SHIFT = {
            date: new Date().toISOString().split('T')[0],
            time: new Date().toTimeString().slice(0, 5),
            shiftLetter: 'A',
            seniorResident: '',
            juniorResident: '',
            gp: '',
            intern: '',
            vdTotal: 0,
            csTotal: 0,
            maternityAdmissions: 0,
            medicalAdmissions: 0,
            nicuAdmissions: 0,
            patients: []
        };

        const INITIAL_PATIENT = {
            name: '',
            age: '',
            history: '',
            ultrasound: '',
            investigations: '',
            diagnosis: '',
            plan: ''
        };

        function App() {
            const [role, setRole] = useState(null);
            const [activeTab, setActiveTab] = useState('create');
            const [step, setStep] = useState(1);
            const [currentShift, setCurrentShift] = useState(INITIAL_SHIFT);
            const [currentPatient, setCurrentPatient] = useState(INITIAL_PATIENT);
            const [shifts, setShifts] = useState([]);
            const [loading, setLoading] = useState(false);
            const [syncing, setSyncing] = useState(false);
            const [googleScriptUrl, setGoogleScriptUrl] = useState(localStorage.getItem('google_script_url') || DEFAULT_GOOGLE_SCRIPT_URL);

            useEffect(() => {
                // Load local backup
                const savedShifts = localStorage.getItem('hospital_shifts');
                if (savedShifts) {
                    setShifts(JSON.parse(savedShifts));
                }
                
                // Fetch latest from Google Sheets if URL exists
                if (googleScriptUrl) {
                    fetchShiftsFromGoogle();
                }
            }, [googleScriptUrl]);

            const fetchShiftsFromGoogle = async () => {
                if (!googleScriptUrl) return;
                setSyncing(true);
                try {
                    // We use a simple fetch. Note: Google Apps Script doGet requires a redirect handle.
                    // Since we can't easily handle redirects in a simple 'no-cors' fetch for GET,
                    // we'll use a JSONP-like approach or just a standard fetch if CORS is handled.
                    // Actually, for Apps Script, standard fetch works if we handle the redirect.
                    const response = await fetch(googleScriptUrl);
                    const data = await response.json();
                    if (Array.isArray(data)) {
                        setShifts(data);
                        localStorage.setItem('hospital_shifts', JSON.stringify(data));
                    }
                } catch (error) {
                    console.error('Error fetching from Google:', error);
                } finally {
                    setSyncing(false);
                }
            };

            const saveToLocalStorage = (newShifts) => {
                localStorage.setItem('hospital_shifts', JSON.stringify(newShifts));
                setShifts(newShifts);
            };

            const saveSettings = () => {
                localStorage.setItem('google_script_url', googleScriptUrl);
                alert('Settings saved! This will be remembered on this device.');
            };

            const handleSavePatient = () => {
                if (!currentPatient.name) return;
                setCurrentShift(prev => ({
                    ...prev,
                    patients: [...prev.patients, currentPatient]
                }));
                setCurrentPatient(INITIAL_PATIENT);
            };

            const handleRemovePatient = (index) => {
                setCurrentShift(prev => ({
                    ...prev,
                    patients: prev.patients.filter((_, i) => i !== index)
                }));
            };

            const handleFinishAndSave = async () => {
                setLoading(true);
                const newShift = { ...currentShift, id: Date.now(), created_at: new Date().toISOString() };
                
                // 1. Save locally first (Backup)
                const updatedShifts = [newShift, ...shifts];
                saveToLocalStorage(updatedShifts);

                // 2. Try to save to Google Sheets
                if (googleScriptUrl) {
                    try {
                        await fetch(googleScriptUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newShift)
                        });
                        console.log('Sent to Google Sheets');
                        // Refresh data after a short delay to allow Google to process
                        setTimeout(fetchShiftsFromGoogle, 2000);
                    } catch (error) {
                        console.error('Error sending to Google Sheets:', error);
                        alert('Warning: Saved locally but failed to sync with Google Sheets.');
                    }
                } else {
                    alert('Saved locally. (Connect Google Sheets in settings to sync online)');
                }
                
                setLoading(false);
                alert('Shift report saved successfully!');
                setCurrentShift(INITIAL_SHIFT);
                setStep(1);
                setActiveTab('view');
            };

            const deleteShift = (id) => {
                if (confirm('Are you sure you want to delete this report? Note: This only deletes it from your local view. It will remain in Google Sheets.')) {
                    const updatedShifts = shifts.filter(s => s.id !== id);
                    saveToLocalStorage(updatedShifts);
                }
            };

            if (!role) {
                return (
                    <div className="login-overlay">
                        <div className="login-box">
                            <h2 className="text-2xl font-bold mb-6">👤 Select Role</h2>
                            <div className="flex flex-col gap-4 items-center">
                                <button onClick={() => setRole('editor')} className="btn-editor w-full p-4 rounded-full font-bold">📝 Editor</button>
                                <button onClick={() => { setRole('viewer'); setActiveTab('view'); }} className="btn-viewer w-full p-4 rounded-full font-bold">👁️ Viewer</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="flex flex-col">
                            <h1 className="text-xl md:text-2xl">🏥 Edna Adan Hospital Handover</h1>
                            {syncing && <span className="text-xs text-teal-200 animate-pulse">🔄 Syncing with Google Sheets...</span>}
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="role-badge hidden sm:block">{role.toUpperCase()}</span>
                            <button onClick={() => setRole(null)} className="bg-white text-blue-900 px-4 py-2 rounded-full text-sm font-bold">Switch Role</button>
                        </div>
                    </header>

                    <div className="main-tabs">
                        {role === 'editor' && (
                            <button onClick={() => setActiveTab('create')} className={`tab-btn ${activeTab === 'create' ? 'active' : ''}`}>✏️ Create Report</button>
                        )}
                        <button onClick={() => setActiveTab('view')} className={`tab-btn ${activeTab === 'view' ? 'active' : ''}`}>📋 View Reports</button>
                        <button onClick={() => setActiveTab('settings')} className={`tab-btn ${activeTab === 'settings' ? 'active' : ''}`}>⚙️ Settings</button>
                    </div>

                    <main className="p-4 md:p-8">
                        {activeTab === 'settings' && (
                            <div className="form-section">
                                <h3 className="text-xl font-bold mb-4">⚙️ Google Sheets Connection</h3>
                                <p className="text-sm text-gray-600 mb-4">
                                    Paste your Google Apps Script Web App URL below to sync your reports to Google Sheets.
                                </p>
                                <input 
                                    type="text" 
                                    className="hospital-input mb-4" 
                                    placeholder="https://script.google.com/macros/s/.../exec" 
                                    value={googleScriptUrl} 
                                    onChange={e => setGoogleScriptUrl(e.target.value)} 
                                />
                                <div className="flex gap-4">
                                    <button onClick={saveSettings} className="hospital-btn">Save URL</button>
                                    <button 
                                        onClick={async () => {
                                            if (!googleScriptUrl) return alert('Please enter a URL first');
                                            setLoading(true);
                                            try {
                                                await fetch(googleScriptUrl, {
                                                    method: 'POST',
                                                    mode: 'no-cors',
                                                    body: JSON.stringify({ test: true, message: 'Connection Test', created_at: new Date().toISOString() })
                                                });
                                                alert('Test signal sent! Check your Google Sheet "Reports" tab for a new row.');
                                            } catch (e) {
                                                alert('Connection failed: ' + e.message);
                                            }
                                            setLoading(false);
                                        }} 
                                        className="bg-gray-200 text-gray-800 px-6 py-2 rounded-full font-bold"
                                    >
                                        🧪 Test Connection
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'create' && role === 'editor' ? (
                            <div>
                                <div className="step-indicator">
                                    <div className={`step ${step === 1 ? 'active' : ''}`}>1. Shift Info</div>
                                    <div className={`step ${step === 2 ? 'active' : ''}`}>2. Patients</div>
                                    <div className={`step ${step === 3 ? 'active' : ''}`}>3. Finish</div>
                                </div>

                                {step === 1 && (
                                    <div className="form-section">
                                        <h3 className="text-xl font-bold mb-4">Shift Details</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <label className="hospital-label">Date</label>
                                                <input type="date" className="hospital-input" value={currentShift.date} onChange={e => setCurrentShift({...currentShift, date: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="hospital-label">Time</label>
                                                <input type="time" className="hospital-input" value={currentShift.time} onChange={e => setCurrentShift({...currentShift, time: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <label className="hospital-label">Senior Resident</label>
                                                <input className="hospital-input" value={currentShift.seniorResident} onChange={e => setCurrentShift({...currentShift, seniorResident: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="hospital-label">Junior Resident</label>
                                                <input className="hospital-input" value={currentShift.juniorResident} onChange={e => setCurrentShift({...currentShift, juniorResident: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                            <div><label className="hospital-label">VD Total</label><input type="number" className="hospital-input" value={currentShift.vdTotal} onChange={e => setCurrentShift({...currentShift, vdTotal: parseInt(e.target.value) || 0})} /></div>
                                            <div><label className="hospital-label">CS Total</label><input type="number" className="hospital-input" value={currentShift.csTotal} onChange={e => setCurrentShift({...currentShift, csTotal: parseInt(e.target.value) || 0})} /></div>
                                            <div><label className="hospital-label">NICU Adm</label><input type="number" className="hospital-input" value={currentShift.nicuAdmissions} onChange={e => setCurrentShift({...currentShift, nicuAdmissions: parseInt(e.target.value) || 0})} /></div>
                                        </div>
                                        <button onClick={() => setStep(2)} className="hospital-btn">Next Step ➡️</button>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="form-section">
                                        <h3 className="text-xl font-bold mb-4">Patient Details</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                            <input placeholder="Patient Name" className="hospital-input" value={currentPatient.name} onChange={e => setCurrentPatient({...currentPatient, name: e.target.value})} />
                                            <input placeholder="Age" className="hospital-input" value={currentPatient.age} onChange={e => setCurrentPatient({...currentPatient, age: e.target.value})} />
                                        </div>
                                        <textarea placeholder="Diagnosis" className="hospital-input mb-4" rows="2" value={currentPatient.diagnosis} onChange={e => setCurrentPatient({...currentPatient, diagnosis: e.target.value})} />
                                        <textarea placeholder="Plan" className="hospital-input mb-4" rows="3" value={currentPatient.plan} onChange={e => setCurrentPatient({...currentPatient, plan: e.target.value})} />
                                        
                                        <div className="flex gap-4 mb-6">
                                            <button onClick={handleSavePatient} className="bg-teal-600 text-white px-6 py-2 rounded-full font-bold">Save Patient</button>
                                            <button onClick={() => setStep(3)} className="bg-blue-900 text-white px-6 py-2 rounded-full font-bold">Preview Shift</button>
                                        </div>

                                        <div className="mt-6">
                                            <h4 className="font-bold mb-2">Patients Added ({currentShift.patients.length})</h4>
                                            {currentShift.patients.map((p, i) => (
                                                <div key={i} className="flex justify-between items-center bg-white p-3 rounded-lg mb-2 shadow-sm">
                                                    <span>{p.name} - {p.diagnosis}</span>
                                                    <button onClick={() => handleRemovePatient(i)} className="text-red-500 font-bold">Delete</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div className="form-section">
                                        <h3 className="text-xl font-bold mb-4">Review & Finish</h3>
                                        <div className="bg-white p-6 rounded-xl border mb-6">
                                            <p><strong>Shift:</strong> {currentShift.shiftLetter} | {currentShift.date}</p>
                                            <p><strong>Team:</strong> {currentShift.seniorResident}, {currentShift.juniorResident}</p>
                                            <p><strong>Deliveries:</strong> VD: {currentShift.vdTotal}, CS: {currentShift.csTotal}</p>
                                            <div className="mt-4">
                                                <strong>Patients:</strong>
                                                {currentShift.patients.map((p, i) => <div key={i} className="ml-4">• {p.name} ({p.diagnosis})</div>)}
                                            </div>
                                        </div>
                                        <div className="flex gap-4">
                                            <button onClick={() => setStep(2)} className="bg-gray-500 text-white px-6 py-2 rounded-full font-bold">Back</button>
                                            <button onClick={handleFinishAndSave} className="hospital-btn" disabled={loading}>
                                                {loading ? 'Saving...' : '✅ Finish & Save'}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : activeTab === 'view' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border">
                                    <h3 className="font-bold text-gray-700">Recent Reports</h3>
                                    <button 
                                        onClick={fetchShiftsFromGoogle} 
                                        disabled={syncing}
                                        className="text-sm bg-teal-50 text-teal-700 px-4 py-2 rounded-full border border-teal-200 hover:bg-teal-100 transition-colors"
                                    >
                                        {syncing ? '🔄 Syncing...' : '🔃 Refresh from Cloud'}
                                    </button>
                                </div>
                                {shifts.length === 0 ? (
                                    <div className="text-center py-20 text-gray-400">No reports found.</div>
                                ) : (
                                    shifts.map(s => (
                                        <div key={s.id} className="shift-card">
                                            <div className="shift-header">
                                                <div>Shift {s.shiftLetter} - {s.date}</div>
                                                {role === 'editor' && (
                                                    <button onClick={() => deleteShift(s.id)} className="text-red-500 text-sm">Delete</button>
                                                )}
                                            </div>
                                            <div className="p-4 bg-gray-50 flex gap-6 text-sm">
                                                <span>Sr: {s.seniorResident}</span>
                                                <span>Jr: {s.juniorResident}</span>
                                                <span>VD: {s.vdTotal}</span>
                                                <span>CS: {s.csTotal}</span>
                                            </div>
                                            {s.patients.map((p, i) => (
                                                <div key={i} className="patient-block">
                                                    <div className="patient-title">{p.name} <span>{p.age}</span></div>
                                                    <div className="mt-2"><strong>Diagnosis:</strong> {p.diagnosis}</div>
                                                    <div className="history-section"><strong>Plan:</strong> {p.plan}</div>
                                                </div>
                                            ))}
                                        </div>
                                    ))
                                )}
                            </div>
                        ) : null}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
